<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Red Store</title>
  </head>
  <body>
    <!-- Header start -->
    <header>
      <div class="container">
        <!-- navbar start -->
        <nav class="navbar flex jus-spacebw text-grey align-center">
          <a href="#"
            ><img src="/images/logo.png" width="125px" alt="Red-store logo"
          /></a>
          <div class="menuitems flex jus-spacebw gap-1 align-center">
            <ul class="flex gap-1 js-spacebw">
              <li>Home</li>
              <li>Products</li>
              <li>About</li>
              <li>Contact</li>
              <li>Acount</li>
            </ul>
            <a href="#"
              ><img
                src="/images/cart.png"
                alt="Cart-icon"
                width="30px"
                height="30px"
            /></a>
            <button class="hamburger" id="hamburger-btn">
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>
        </nav>
        <!-- navbar end -->
      </div>
    </header>
    <!-- Product-section -->
    <section id="product-section">
      <div class="container">
        <div class="product-container flex flex-col">
          <div class="product-img">
            <img src="images/gallery-1.jpg" alt="" />
          </div>
          <div class="small-img-container gap-1 flex jus-spacebw">
            <img src="images/gallery-1.jpg" alt="" />
            <img src="images/gallery-2.jpg" alt="" />
            <img src="images/gallery-3.jpg" alt="" />
            <img src="images/gallery-4.jpg" alt="" />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
