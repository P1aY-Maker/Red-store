<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Red Store</title>
  </head>
  <body>
    <!-- Header start -->
    <header>
      <div class="container">
        <!-- navbar start -->
        <nav class="navbar flex jus-spacebw text-grey align-center">
          <a href="#"
            ><img src="/images/logo.png" width="125px" alt="Red-store logo"
          /></a>
          <div class="menuitems flex jus-spacebw gap-1 align-center">
            <ul class="flex gap-1 js-spacebw">
              <li>Home</li>
              <li>Products</li>
              <li>About</li>
              <li>Contact</li>
              <li>Acount</li>
            </ul>
            <a href="#"
              ><img
                src="/images/cart.png"
                alt="Cart-icon"
                width="30px"
                height="30px"
            /></a>
            <button class="hamburger" id="hamburger-btn">
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>
        </nav>
        <!-- navbar end -->

        <!-- Header-img,header-img start -->
        <section id="header-content" class="flex jus-spacebw">
          <div class="head-text">
            <h1>
              Give Your Workout <br />
              A New Style !
            </h1>
            <p class="lead-text">
              Success isn't always about greatness. It's about consistency.
              Consistent <br />
              hard work gain success. Gretness will come.
            </p>
            <button class="orange-btn bg-orange text-white">
              <a href="#"></a>Explore Now!
            </button>
          </div>
          <div class="header-img">
            <img src="images/image1.png" alt="Two player playing football" />
          </div>
        </section>
      </div>
    </header>
    <!-- Header-section end -->

    <!-- Category section -->
    <section id="category-section">
      <div class="container jus-spacebw`align-center">
        <div class="card-container flex align-center jus-spacebw">
          <img src="images/category-1.jpg" alt="" />
          <img src="images/category-2.jpg" alt="" />
          <img src="images/category-3.jpg" alt="" />
        </div>
      </div>
    </section>
  </body>
</html>
